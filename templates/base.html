<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}KyoSabi{% endblock %}</title>
    <meta name="csrf-token" content="{{ layout.csrf_token }}">
    <meta name="pbkdf2-iterations" content="{{ layout.pbkdf2_iterations }}">
    <link rel="stylesheet" href="/static/app.css">
    <script src="/static/htmx.min.js"></script>
    <script src="/static/app.js" defer></script>
  </head>
  <body hx-headers='{"X-CSRF-Token": "{{ layout.csrf_token }}"}'>
    <header class="topbar">
      <a class="brand" href="/">KyoSabi</a>
      <nav>
        <a href="/">Dashboard</a>
        <a href="/upload">Upload</a>
        <a href="/paste">Paste</a>
        <a href="/shorten">Shorten</a>
        {% if layout.is_admin %}<a href="/admin/tokens">Admin</a>{% endif %}
      </nav>
      {% if let Some(email) = layout.user_email %}
      <form class="logout-form" method="post" action="/auth/logout" hx-post="/auth/logout">
        <span class="user-email">{{ email }}</span>
        <button type="submit">Log out</button>
      </form>
      {% endif %}
    </header>
    <main>
      {% block content %}{% endblock %}
    </main>
  </body>
</html>
