<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}Watari{% endblock %}</title>
    <meta name="csrf-token" content="{{ layout.csrf_token }}">
    <meta name="pbkdf2-iterations" content="{{ layout.pbkdf2_iterations }}">
    <link rel="stylesheet" href="/static/app.css">
    <script src="/static/htmx.min.js"></script>
    <script src="/static/app.js" defer></script>
  </head>
  <body hx-headers='{"X-CSRF-Token": "{{ layout.csrf_token }}"}'>
    <div class="shell">
      <aside class="sidebar">
        <a class="brand" href="/">
          <span class="brand-mark">☕</span>
          <span class="brand-name">Watari</span>
        </a>
        <nav class="sidebar-nav">
          <a href="/">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="9" rx="1.5"/><rect x="14" y="3" width="7" height="5" rx="1.5"/><rect x="14" y="12" width="7" height="9" rx="1.5"/><rect x="3" y="16" width="7" height="5" rx="1.5"/></svg>
            <span>Dashboard</span>
          </a>
          <a href="/upload">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><path d="M12 16V4"/><path d="M6.5 9.5 12 4l5.5 5.5"/><path d="M4 16.5V19a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-2.5"/></svg>
            <span>Upload</span>
          </a>
          <a href="/paste">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><rect x="6" y="4" width="12" height="17" rx="2"/><path d="M9 4V3a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v1"/><path d="M9 11h6"/><path d="M9 15h6"/><path d="M9 19h3"/></svg>
            <span>Paste</span>
          </a>
          <a href="/shorten">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><path d="M9 15 15 9"/><path d="M10.5 6.5 12 5a3.54 3.54 0 1 1 5 5l-1.5 1.5"/><path d="M13.5 17.5 12 19a3.54 3.54 0 1 1-5-5l1.5-1.5"/></svg>
            <span>Shorten</span>
          </a>
          {% if layout.is_admin %}
          <a href="/admin/tokens">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3 4.5 6v6c0 4.5 3 7.5 7.5 9 4.5-1.5 7.5-4.5 7.5-9V6L12 3Z"/><path d="m9.5 12 1.75 1.75L14.5 10"/></svg>
            <span>Admin</span>
          </a>
          {% endif %}
        </nav>
        <div class="sidebar-footer">
          <button type="button" id="theme-toggle" class="icon-btn" title="Toggle theme">
            <svg data-icon="sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41"/></svg>
            <svg data-icon="moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79Z"/></svg>
            <span>Theme</span>
          </button>
          {% if let Some(email) = layout.user_email %}
          <span class="user-email" title="{{ email }}">{{ email }}</span>
          <form method="post" action="/auth/logout" hx-post="/auth/logout" title="Log out">
            <button type="submit" class="icon-btn">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H6a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h3"/><path d="M16 17l5-5-5-5"/><path d="M21 12H9"/></svg>
              <span>Log out</span>
            </button>
          </form>
          {% endif %}
        </div>
      </aside>
      <div class="content-area">
        <main>
          {% block content %}{% endblock %}
        </main>
        <footer class="footer">
          <a href="https://github.com/coko7/watari" target="_blank" rel="noopener">Watari</a>
          on GitHub ·
          <a href="https://github.com/orhun/rustypaste" target="_blank" rel="noopener">rustypaste</a>
          on GitHub
        </footer>
      </div>
    </div>
  </body>
</html>
